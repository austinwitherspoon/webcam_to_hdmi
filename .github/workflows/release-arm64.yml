name: Release arm64 build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - name: Build release binary
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp target/aarch64-unknown-linux-gnu/release/webcam_to_hdmi release-assets/webcam_to_hdmi-aarch64-unknown-linux-gnu
          cp deploy/setup.sh release-assets/setup.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webcam_to_hdmi-arm64-release-assets
          path: release-assets/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/webcam_to_hdmi-aarch64-unknown-linux-gnu
            release-assets/setup.sh
